<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#1f2937" stroke="#d4af37" stroke-width="2"/>
  
  <!-- Sports equipment icon - stylized dumbbell/weights -->
  <g fill="#d4af37">
    <!-- Left weight -->
    <rect x="4" y="12" width="4" height="8" rx="2"/>
    <!-- Right weight -->
    <rect x="24" y="12" width="4" height="8" rx="2"/>
    <!-- Center bar -->
    <rect x="8" y="15" width="16" height="2" rx="1"/>
    <!-- Center grip -->
    <rect x="12" y="14" width="8" height="4" rx="2" fill="#f59e0b"/>
  </g>
  
  <!-- Optional: Small "C" initial -->
  <text x="16" y="26" text-anchor="middle" fill="#d4af37" font-family="serif" font-size="8" font-weight="bold">C</text>
</svg> 