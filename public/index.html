  <!-- Performance: Service Worker registration (inline for speed) -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(registration => {
            console.log('✅ SW registered:', registration.scope);
          })
          .catch(error => {
            console.warn('❌ SW registration failed:', error);
          });
      });
    }
    
    // Performance: Early performance monitoring
    if ('PerformanceObserver' in window) {
      const observer = new PerformanceObserver(list => {
        list.getEntries().forEach(entry => {
          if (entry.entryType === 'navigation') {
            const nav = entry;
            const ttfb = nav.responseStart - nav.fetchStart;
            const domLoad = nav.domContentLoadedEventEnd - nav.fetchStart;
            console.log(`🚀 TTFB: ${ttfb.toFixed(0)}ms, DOM: ${domLoad.toFixed(0)}ms`);
          }
        });
      });
      observer.observe({ entryTypes: ['navigation'] });
    }
  </script>
